<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axure Scale</title>
    <link rel="stylesheet" href="/src/popup/style.css" />
  </head>
  <body>
    <main class="panel">
      <div class="panel-head">
        <h1>Axure Scale</h1>
        <p id="status" class="status">正在讀取目前分頁…</p>
      </div>

      <p id="siteMeta" class="site-meta"></p>

      <div class="zoom-section">
        <div class="zoom-header-row">
          <label for="zoomRange">縮放</label>
          <div class="zoom-val-group">
            <output id="zoomValue">100</output><span class="zoom-pct">%</span>
          </div>
        </div>
        <input id="zoomRange" type="range" min="50" max="200" step="10" value="100" />
      </div>

      <div class="actions">
        <button id="zoomOut" type="button">−</button>
        <button id="reset" type="button">重置</button>
        <button id="zoomIn" type="button">+</button>
      </div>

      <div class="hint">
        <span><kbd>⌘ +</kbd> 放大</span>
        <span><kbd>⌘ −</kbd> 縮小</span>
        <span><kbd>⌘ 0</kbd> 重置</span>
      </div>
    </main>
    <script type="module" src="/src/popup/main.ts"></script>
  </body>
</html>
