<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axure Scale</title>
    <link rel="stylesheet" href="/src/popup/style.css" />
  </head>
  <body>
    <main class="panel">
      <h1>Axure Scale</h1>
      <p id="status" class="status">正在讀取目前分頁…</p>
      <p id="siteMeta" class="site-meta"></p>

      <label for="zoomRange">縮放</label>
      <div class="zoom-row">
        <input id="zoomRange" type="range" min="50" max="200" step="10" value="100" />
        <output id="zoomValue">100%</output>
      </div>

      <div class="actions">
        <button id="zoomOut" type="button">-</button>
        <button id="reset" type="button">重置</button>
        <button id="zoomIn" type="button">+</button>
      </div>

      <p class="hint">快捷鍵：Cmd/Ctrl + / - / 0（備援：⌥⇧↑ / ⌥⇧↓ / ⌥⇧0）</p>
    </main>
    <script type="module" src="/src/popup/main.ts"></script>
  </body>
</html>
